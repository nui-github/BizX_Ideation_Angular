<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexus Agent Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                50: '#f0f9ff',
                100: '#e0f2fe',
                500: '#0ea5e9',
                600: '#0284c7',
                700: '#0369a1',
                900: '#0c4a6e',
              }
            },
            fontFamily: {
              sans: ['"IBM Plex Sans Thai"', 'sans-serif'],
            },
            borderRadius: {
              'xs': '2px',
              'sm': '4px',
              'md': '4px',
              'lg': '8px',
              'xl': '8px',
              '2xl': '16px',
              '3xl': '16px',
            }
          }
        }
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@100;200;300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body, html, input, button, select, textarea,
      [class^="ant-"], [class*=" ant-"] {
        font-family: 'IBM Plex Sans Thai', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans', sans-serif !important;
      }
      .font-mono, .font-mono *, code, pre, kbd, samp {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace !important;
      }
      body {
        margin: 0;
      }
      
      /* --- DESIGN SYSTEM BORDER RADIUS OVERRIDES --- */
      
      /* 1. Input, text field, text area, dropdown, select, box upload use 4px */
      input:not([type="checkbox"]):not([type="radio"]),
      textarea,
      select,
      .ant-input,
      .ant-input-affix-wrapper,
      .ant-select-selector,
      .ant-select-single .ant-select-selector,
      .ant-select,
      .ant-select-dropdown,
      .ant-picker,
      .ant-picker-dropdown,
      .ant-picker-range-wrapper,
      /* Upload boxes and dashed areas */
      .border-dashed {
        border-radius: 4px !important;
      }

      /* 2. Button use 4px */
      button:not(.rounded-full):not([class*="-circle"]):not([class*="p-"]),
      .ant-btn:not(.ant-btn-circle):not(.ant-btn-icon-only):not(.rounded-full) {
        border-radius: 4px !important;
      }

      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f5f9; 
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8; 
      }
      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }
      .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      @keyframes bounce-subtle {
        0%, 100% { transform: translateY(0) scale(0.9); }
        50% { transform: translateY(-3px) scale(0.9); }
      }
      .animate-bounce-subtle {
        animation: bounce-subtle 2s ease-in-out infinite;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.2.0",
    "react/": "https://esm.sh/react@18.2.0/",
    "react-dom": "https://esm.sh/react-dom@18.2.0",
    "react-dom/": "https://esm.sh/react-dom@18.2.0/",
    "lucide-react": "https://esm.sh/lucide-react@0.294.0?deps=react@18.2.0",
    "dayjs": "https://esm.sh/dayjs@1.11.10"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-slate-50 antialiased text-slate-800">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
